  allow_missing_word_alignment: true
  recording_subsample_prop: null
  frequency_experiments:
    beta_13_24:
      target_sfreq: 50.0
      l_freq: 13.0
      h_freq: 24.0
    beta_gamma_13_45:
      target_sfreq: 100.0
      l_freq: 13.0
      h_freq: 45.0
    low_gamma_30_45:
      target_sfreq: 100.0
      l_freq: 30.0
      h_freq: 45.0
    gamma_30_55:
      target_sfreq: 128.0
      l_freq: 30.0
      h_freq: 55.0
    high_gamma_70_120:
      target_sfreq: 250.0
      l_freq: 70.0
      h_freq: 120.0
  task_mode: reading
neuro_tokenizers:
  biocodec:
    tokenizer_name: biocodec
    tokenizer_variant: default
    tokenizer_checkpoint: ./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
    tokenizer_ckpt: ./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
    tokenizer_config_path: null
    vocab_size: 256
    num_quantizers: 6
    num_quantizers_used: 6
    tokenizer_downsample_ratio: 12
    overlap_ratio: 0.0
  brainomni_base:
    tokenizer_name: brainomni
    tokenizer_variant: base
    tokenizer_checkpoint: ./brainstorm/neuro_tokenizers/base/BrainOmni.pt
    tokenizer_ckpt: ./brainstorm/neuro_tokenizers/base/BrainOmni.pt
    tokenizer_config_path: ./brainstorm/neuro_tokenizers/base/model_cfg.json
    vocab_size: 512
    num_quantizers: 4
    num_quantizers_used: 4
    tokenizer_downsample_ratio: 64
    overlap_ratio: 0.25
  brainomni_tiny:
    tokenizer_name: brainomni
    tokenizer_variant: tiny
    tokenizer_checkpoint: ./brainstorm/neuro_tokenizers/tiny/BrainOmni.pt
    tokenizer_ckpt: ./brainstorm/neuro_tokenizers/tiny/BrainOmni.pt
    tokenizer_config_path: ./brainstorm/neuro_tokenizers/tiny/model_cfg.json
    vocab_size: 512
    num_quantizers: 4
    num_quantizers_used: 4
    tokenizer_downsample_ratio: 64
    overlap_ratio: 0.25
  braintokenizer_default:
    tokenizer_name: braintokenizer
    tokenizer_variant: default
    tokenizer_checkpoint: ./brainstorm/neuro_tokenizers/braintokenizer/BrainTokenizer.pt
    tokenizer_ckpt: ./brainstorm/neuro_tokenizers/braintokenizer/BrainTokenizer.pt
    tokenizer_config_path: ./brainstorm/neuro_tokenizers/braintokenizer/model_cfg.json
    vocab_size: 512
    num_quantizers: 4
    num_quantizers_used: 4
    tokenizer_downsample_ratio: 64
    overlap_ratio: 0.0
model:
  tokenizer_name: biocodec
  tokenizer_variant: default
  tokenizer_checkpoint: ./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
  tokenizer_ckpt: ./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
  tokenizer_config_path: null
  vocab_size: 256
  num_quantizers: 6
  num_quantizers_used: 6
  tokenizer_downsample_ratio: 12
  overlap_ratio: 0.0
  latent_dim: 512
  num_layers: 8
  num_heads: 8
  use_gradient_checkpointing: false
  mask_duration: 3.0
  num_subsegments_to_mask: 20
  sampling_rate: 50
  fourier_pos_dim: 250
  num_sensor_types: 3
  train_from_scratch: true
  criss_cross_checkpoint: ./checkpoints/baseline/meg-xl-med.ckpt
  use_promoted_checkpoint: false
  promoted_checkpoint: null
training:
  batch_size: 4
  num_epochs: null
  max_steps: 2
  learning_rate: 0.0001
  warmup_steps: 250
  gradient_clip_val: 1.0
  num_workers: 0
  pin_memory: true
  persistent_workers: false
  use_recording_sampler: true
  sampler_seed: 42
logging:
  wandb_project: ''
  wandb_entity: null
  experiment_name: __batch_probe__reading_beta_13_24_fixed50_50hz_biocodec_b4_gpu1
  save_dir: ./logs/eeg_reading_listening_training
  log_every_n_steps: 10
checkpoint:
  save_dir: ./checkpoints/eeg_reading_listening_training
  every_n_train_steps: 5000
  save_top_k: 0
  save_last: false
  monitor: val/loss
  mode: min
  resume: false
  resume_path: null
trainer:
  accelerator: gpu
  devices: 1
  strategy: auto
  precision: bf16-mixed
  accumulate_grad_batches: 1
  val_check_interval: 2
seed: 42
