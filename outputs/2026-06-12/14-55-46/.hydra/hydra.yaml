hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - data.target_sfreq=100.0
    - model.sampling_rate=100
    - data.l_freq=30.0
    - data.h_freq=45.0
    - data.cache_dir=./data/cache/eeg_multi_training/low_gamma_30_45_biocodec
    - logging.experiment_name=eeg_multi_low_gamma_30_45_biocodec_scratch_seed42
    - logging.save_dir=./logs/eeg_multi_training
    - checkpoint.save_dir=./checkpoints/eeg_multi_training
    - trainer.devices=2
    - trainer.strategy=fsdp
    - trainer.val_check_interval=500
    - checkpoint.every_n_train_steps=5000
    - seed=42
    - model.tokenizer_name=biocodec
    - model.tokenizer_variant=default
    - model.tokenizer_checkpoint=./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
    - model.tokenizer_ckpt=./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
    - model.vocab_size=256
    - model.num_quantizers=6
    - model.num_quantizers_used=6
    - model.tokenizer_downsample_ratio=12
    - model.overlap_ratio=0.0
    - model.train_from_scratch=true
    - model.use_promoted_checkpoint=false
  job:
    name: train_criss_cross_eeg_multi
    chdir: null
    override_dirname: checkpoint.every_n_train_steps=5000,checkpoint.save_dir=./checkpoints/eeg_multi_training,data.cache_dir=./data/cache/eeg_multi_training/low_gamma_30_45_biocodec,data.h_freq=45.0,data.l_freq=30.0,data.target_sfreq=100.0,logging.experiment_name=eeg_multi_low_gamma_30_45_biocodec_scratch_seed42,logging.save_dir=./logs/eeg_multi_training,model.num_quantizers=6,model.num_quantizers_used=6,model.overlap_ratio=0.0,model.sampling_rate=100,model.tokenizer_checkpoint=./brainstorm/neuro_tokenizers/biocodec_ckpt.pt,model.tokenizer_ckpt=./brainstorm/neuro_tokenizers/biocodec_ckpt.pt,model.tokenizer_downsample_ratio=12,model.tokenizer_name=biocodec,model.tokenizer_variant=default,model.train_from_scratch=true,model.use_promoted_checkpoint=false,model.vocab_size=256,seed=42,trainer.devices=2,trainer.strategy=fsdp,trainer.val_check_interval=500
    id: ???
    num: ???
    config_name: train_criss_cross_eeg_multi_feq
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /workspace
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /workspace/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /workspace/outputs/2026-06-12/14-55-46
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
