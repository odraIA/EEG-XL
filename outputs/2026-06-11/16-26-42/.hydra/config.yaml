model:
  train_from_scratch: false
  criss_cross_checkpoint: ./checkpoints/baseline/meg-xl-med.ckpt
  use_promoted_checkpoint: false
  promoted_checkpoint: null
  tokenizer_name: biocodec
  tokenizer_checkpoint: ./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
  word_mlp:
    hidden_dim: 2048
    embed_dim: 1024
    dropout: 0.1
data:
  dataset_type: eeg_pooled
  task_mode: reading_listening
  root: ./datasets
  cache_dir: ./data/cache/eeg_reading_listening
  max_channel_dim: auto
  eeg_sensor_type: eeg
  use_hashed_split: true
  split_group: auto
  split_ratios:
  - 0.8
  - 0.1
  - 0.1
  all_sessions: null
  train_pct: 0.25
  train_sessions: null
  val_sessions: null
  test_sessions: null
  tasks: null
  l_freq: 0.1
  h_freq: 40.0
  target_sfreq: 50
  segment_length: 150.0
  subsegment_duration: 3.0
  words_per_segment: 50
  window_onset_offset: -0.5
  datasets:
  - dataset_type: zuco
    dataset_name: zuco
    task_mode: reading
    root: ./datasets/zuco2/data/zuco2
    cache_dir: ./data/cache/eeg_reading_listening/zuco
    max_channel_dim: auto
    tasks:
    - NR
    eeg_sensor_type: eeg
  - dataset_type: eegdash
    dataset_name: eegdash
    task_mode: reading
    root: ./datasets/eegdash/data/nm000228
    cache_dir: ./data/cache/eeg_reading_listening/eegdash
    max_channel_dim: auto
    tasks:
    - delong
  - dataset_type: openneuro_ds004408
    dataset_name: openneuro_ds004408
    task_mode: listening
    root: ./datasets/OpenNeuroEEG_ds004408
    cache_dir: ./data/cache/eeg_reading_listening/openneuro_ds004408
    max_channel_dim: auto
    tasks:
    - listening
  - dataset_type: openneuro_ds007808
    dataset_name: openneuro_ds007808
    task_mode: listening
    root: ./datasets/OpenNeuroEEG_ds007808
    cache_dir: ./data/cache/eeg_reading_listening/openneuro_ds007808
    max_channel_dim: auto
    tasks:
    - listening
    - listeningcovert
t5:
  model_name: t5-large
  layer: 12
  cache_dir: ./embeddings_cache
training:
  batch_size: 1
  num_epochs: 50
  resume_checkpoint: null
  criss_cross_lr: 1.0e-05
  word_mlp_lr: 0.001
  from_scratch_lr: 0.0001
  weight_decay: 0.0001
  gradient_clip_val: 1.0
  patience: 10
  min_delta: 0.001
  num_workers: 0
  pin_memory: true
loss:
  norm_kind: xy
  temperature: true
  bias: true
  reduction: sum
evaluation:
  retrieval_set_sizes:
  - 50
  - 250
  k: 10
logging:
  wandb_project: brainstorm-eeg-eval
  experiment_name: eeg_zuco-eegdash-ds004408-ds007808_reading_listening_50hz_biocodec_pretrained_seed42
  log_every_n_steps: 10
  save_dir: logs/eeg_sweeps/eeg_zuco-eegdash-ds004408-ds007808_reading_listening_50hz_biocodec_pretrained_seed42
  checkpoint_dir: checkpoints/eeg_sweeps/eeg_zuco-eegdash-ds004408-ds007808_reading_listening_50hz_biocodec_pretrained_seed42
device: cuda
seed: 42
