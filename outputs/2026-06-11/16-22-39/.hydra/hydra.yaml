hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - data.task_mode=listening
    - data.target_sfreq=100
    - model.tokenizer_name=biocodec
    - model.train_from_scratch=false
    - model.use_promoted_checkpoint=false
    - seed=42
    - logging.experiment_name=eeg_ds004408-ds007808_listening_100hz_biocodec_pretrained_seed42
    - logging.save_dir=logs/eeg_sweeps/eeg_ds004408-ds007808_listening_100hz_biocodec_pretrained_seed42
    - logging.checkpoint_dir=checkpoints/eeg_sweeps/eeg_ds004408-ds007808_listening_100hz_biocodec_pretrained_seed42
    - model.criss_cross_checkpoint=./checkpoints/baseline/meg-xl-med.ckpt
    - model.tokenizer_checkpoint=./brainstorm/neuro_tokenizers/biocodec_ckpt.pt
  job:
    name: evaluate_criss_cross_word_classification
    chdir: null
    override_dirname: data.target_sfreq=100,data.task_mode=listening,logging.checkpoint_dir=checkpoints/eeg_sweeps/eeg_ds004408-ds007808_listening_100hz_biocodec_pretrained_seed42,logging.experiment_name=eeg_ds004408-ds007808_listening_100hz_biocodec_pretrained_seed42,logging.save_dir=logs/eeg_sweeps/eeg_ds004408-ds007808_listening_100hz_biocodec_pretrained_seed42,model.criss_cross_checkpoint=./checkpoints/baseline/meg-xl-med.ckpt,model.tokenizer_checkpoint=./brainstorm/neuro_tokenizers/biocodec_ckpt.pt,model.tokenizer_name=biocodec,model.train_from_scratch=false,model.use_promoted_checkpoint=false,seed=42
    id: ???
    num: ???
    config_name: eval_criss_cross_word_classification_eeg_listening
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /workspace
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /workspace/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /workspace/outputs/2026-06-11/16-22-39
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
