# Continuous EEG pre-training as a minimal MEG-XL adaptation.
#
# The tokenizer, embeddings, criss-cross attention, sensor_mask semantics,
# output head and masked-token objective are the original MEG-XL components.
# The continuous EEG loader only preserves physical-run continuity and marks
# which listeningcovert intervals are eligible reconstruction targets.

defaults:
  - train_criss_cross_eeg_multi_feq
  - _self_


datasets_config:
  - type: "openneuro_ds004408"
    data_root: "/workspace/datasets/OpenNeuroEEG_ds004408"
    subjects: null
    sessions: null
    tasks: ["listening"]
    val_subjects: ["sub-017", "sub-018", "sub-019"]

    # MEG-XL-style segmentation: complete, non-overlapping windows inside
    # each physical run. The incomplete final remainder is discarded.
    cover_all_samples: false
    short_stream_policy: "error"

  - type: "openneuro_ds007808"
    data_root: "/workspace/datasets/OpenNeuroEEG_ds007808"
    subjects: null
    sessions: null
    tasks: ["listening", "listeningcovert"]
    val_sessions:
      - "ses-20240621"
      - "ses-20240624"
      - "ses-20240625"
      - "ses-20240626"
      - "ses-20240627"
      - "ses-20240628"
      - "ses-20240701"
      - "ses-20241119"
      - "ses-20241227"

    # Keep the complete listeningcovert run visible as context. Only samples
    # labelled trial_type=listening can be chosen as masked-token targets.
    listeningcovert_policy: "full_recording_listening_targets"
    listening_trial_type: "listening"
    listening_interval_start: "onset"
    group_listeningcovert_by: "recording"
    merge_gap_seconds: 0.0

    cover_all_samples: false
    short_stream_policy: "error"

  - type: "sparrkulee"
    data_root: "/workspace/datasets/sparrkulee"
    subjects: null
    sessions: null
    tasks: ["listeningActive"]
    val_subjects:
      - "sub-101"
      - "sub-102"
      - "sub-103"
      - "sub-104"
      - "sub-105"

    cover_all_samples: false
    short_stream_policy: "error"


data:
  task_mode: "listening"
  cache_dir: "./data/cache/eeg_preprocessed"
  segment_length: 150.0
  subsegment_duration: 3.0

  # Normal EEG runs remain unchanged. Only experiment-specific configs should
  # set this to true and provide meg_datasets_config.
  mix_eeg_meg: false
  meg_cache_dir: "./data/cache/meg_preprocessed"
  meg_recording_subsample_prop: null
  shuffle_segments: false
  shuffle_segment_duration: 3.0

  # Retained because the shared EEG training entrypoint accepts them. The
  # continuous loader does not use word alignment.
  words_per_segment: 50
  window_onset_offset: -0.5
  allow_missing_word_alignment: true


model:
  # 0=GRAD, 1=MAG, 2=EEG. No separate modality embedding is introduced.
  num_sensor_types: 3

  # Joint-transfer options are disabled by default and do not affect EEG-only
  # runs. The dedicated joint config enables all three.
  eeg_as_meg_sensor_type: false
  eeg_meg_sensor_type_id: 1
  initialize_eeg_from_meg: false

  # Uses more VRAM but avoids recomputing activations in the backward pass.
  use_gradient_checkpointing: false


# Ignored while data.mix_eeg_meg=false.
joint:
  meg_batch_size: 1
  eeg_batch_size: 1
  meg_loss_weight: 1.0
  eeg_loss_weight: 1.0
  train_loader_mode: "max_size_cycle"
  val_loader_mode: "min_size"


logging:
  experiment_name: "criss-cross-eeg-continuous-megxl-adaptation"
  save_dir: "./logs/eeg_continuous_training"


checkpoint:
  save_dir: "./checkpoints/eeg_continuous_training"


trainer:
  accelerator: "gpu"
  devices: 1
  strategy: "auto"
  precision: "bf16-mixed"
  accumulate_grad_batches: 1
  val_check_interval: 500


training:
  gradient_clip_val: 1.0
