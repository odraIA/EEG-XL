# Continuous EEG pre-training with physical-run continuity.
#
# This configuration inherits the architecture and optimizer settings from
# train_criss_cross_eeg_multi_feq.yaml, but the continuous EEG entrypoint swaps
# in a continuity-aware DataModule and model implementation.

defaults:
  - train_criss_cross_eeg_multi_feq
  - _self_


datasets_config:
  - type: "openneuro_ds004408"
    data_root: "/workspace/datasets/OpenNeuroEEG_ds004408"
    subjects: null
    sessions: null
    tasks: ["listening"]
    val_subjects: ["sub-017", "sub-018", "sub-019"]

    # Keep each physical run intact. A final overlapping window can cover the
    # remainder, while genuinely short recordings are padded and explicitly
    # masked instead of repeated cyclically.
    cover_all_samples: true
    short_stream_policy: "zero_pad"
    eeg_reference: "average"

  - type: "openneuro_ds007808"
    data_root: "/workspace/datasets/OpenNeuroEEG_ds007808"
    subjects: null
    sessions: null
    tasks: ["listening", "listeningcovert"]
    val_sessions:
      - "ses-20240621"
      - "ses-20240624"
      - "ses-20240625"
      - "ses-20240626"
      - "ses-20240627"
      - "ses-20240628"
      - "ses-20240701"
      - "ses-20241119"
      - "ses-20241227"

    # Preserve the complete listeningcovert run as visible temporal context.
    # Only trial_type=listening samples are eligible for masking and loss.
    listeningcovert_policy: "full_recording_listening_targets"
    listening_trial_type: "listening"
    listening_interval_start: "onset"
    group_listeningcovert_by: "recording"
    merge_gap_seconds: 0.0

    cover_all_samples: true
    short_stream_policy: "zero_pad"
    eeg_reference: "average"

  - type: "sparrkulee"
    data_root: "/workspace/datasets/sparrkulee"
    subjects: null
    sessions: null
    tasks: ["listeningActive"]

    # Keep subjects entirely disjoint between train and validation.
    val_subjects:
      - "sub-101"
      - "sub-102"
      - "sub-103"
      - "sub-104"
      - "sub-105"

    cover_all_samples: true
    short_stream_policy: "zero_pad"
    eeg_reference: "average"


data:
  task_mode: "listening"
  cache_dir: "./data/cache/eeg_continuous"
  segment_length: 150.0
  subsegment_duration: 3.0

  # The inherited 0.1-40 Hz passband requires a sampling rate above 80 Hz.
  # Keep the requested band and use 100 Hz rather than silently removing the
  # 25-40 Hz content at a 50 Hz sampling rate.
  target_sfreq: 100.0

  # Retained because the shared training entrypoint accepts these arguments;
  # the continuous DataModule intentionally ignores word alignment.
  words_per_segment: 50
  window_onset_offset: -0.5
  allow_missing_word_alignment: true


model:
  sampling_rate: 100

  # The EEG-specific entrypoint keeps the original two-row GRAD/MAG embedding
  # for MEG checkpoint compatibility and adds a separate EEG/MEG modality
  # embedding. EEG orientation is gated off after projection.
  num_sensor_types: 3

  # Uses more VRAM but avoids recomputing activations in the backward pass.
  use_gradient_checkpointing: false


logging:
  experiment_name: "criss-cross-eeg-continuous-listening-spatial-masked-100hz"
  save_dir: "./logs/eeg_continuous_training"


checkpoint:
  save_dir: "./checkpoints/eeg_continuous_training"


trainer:
  accelerator: "gpu"
  devices: 1
  strategy: "auto"
  precision: "bf16-mixed"
  accumulate_grad_batches: 1
  val_check_interval: 500


training:
  gradient_clip_val: 1.0
